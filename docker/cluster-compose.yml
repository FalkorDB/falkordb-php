services:
  node0:
    image: falkordb/falkordb:edge
    container_name: falkordb-node0
    hostname: node0
    ports:
      - "17000:17000"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        cat <<EOF >/data/node.conf
        port 17000
        loadmodule /var/lib/falkordb/bin/falkordb.so
        cluster-enabled yes
        cluster-config-file /data/nodes.conf
        cluster-node-timeout 5000
        cluster-preferred-endpoint-type hostname
        cluster-announce-hostname localhost
        cluster-announce-ip node0
        cluster-announce-port 17000
        EOF
        redis-server /data/node.conf
    networks: [falkordb-cluster]

  node1:
    image: falkordb/falkordb:edge
    container_name: falkordb-node1
    hostname: node1
    ports:
      - "17001:17001"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        cat <<EOF >/data/node.conf
        port 17001
        loadmodule /var/lib/falkordb/bin/falkordb.so
        cluster-enabled yes
        cluster-config-file /data/nodes.conf
        cluster-node-timeout 5000
        cluster-preferred-endpoint-type hostname
        cluster-announce-hostname localhost
        cluster-announce-ip node1
        cluster-announce-port 17001
        EOF
        redis-server /data/node.conf
    networks: [falkordb-cluster]

  node2:
    image: falkordb/falkordb:edge
    container_name: falkordb-node2
    hostname: node2
    ports:
      - "17002:17002"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        cat <<EOF >/data/node.conf
        port 17002
        loadmodule /var/lib/falkordb/bin/falkordb.so
        cluster-enabled yes
        cluster-config-file /data/nodes.conf
        cluster-node-timeout 5000
        cluster-preferred-endpoint-type hostname
        cluster-announce-hostname localhost
        cluster-announce-ip node2
        cluster-announce-port 17002
        EOF
        redis-server /data/node.conf
    networks: [falkordb-cluster]

  cluster-creator:
    image: falkordb/falkordb:edge
    container_name: falkordb-cluster-creator
    depends_on:
      - node0
      - node1
      - node2
    entrypoint: /bin/bash
    command:
      - -c
      - |
        sleep 15
        redis-cli --cluster create node0:17000 node1:17001 node2:17002 --cluster-replicas 0 --cluster-yes
        sleep infinity
    networks: [falkordb-cluster]

networks:
  falkordb-cluster:
